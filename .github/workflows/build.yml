name: Build

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libpipewire-0.3-dev \
            libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ matrix.target }}-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/venturi dist/
          cp data/venturi.desktop dist/
          cp data/org.venturi.Venturi.metainfo.xml dist/
          cp data/org.venturi.Venturi.svg dist/
          tar -czf venturi-${{ matrix.target }}.tar.gz -C dist .

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: venturi-${{ matrix.target }}
          path: venturi-${{ matrix.target }}.tar.gz
          retention-days: 30
