name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libpipewire-0.3-dev \
            libclang-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: unit-tests-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: unit-tests-${{ runner.os }}-

      - name: Run unit tests
        run: cargo test --lib
