name: Flatpak

on:
  push:
    branches: [main]
  merge_group:

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Cargo sources
        run: |
          pip install aiohttp tomlkit --break-system-packages
          curl -L -o /tmp/flatpak-cargo-generator.py \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/refs/heads/master/cargo/flatpak-cargo-generator.py
          python3 /tmp/flatpak-cargo-generator.py Cargo.lock -o flatpak/cargo-sources.json

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/org.venturi.Venturi.json
          bundle: venturi.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@v4
        with:
          name: venturi-flatpak
          path: venturi.flatpak
          retention-days: 30
