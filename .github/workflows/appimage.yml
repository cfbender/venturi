name: AppImage

on:
  push:
    branches: [main]
  merge_group:

jobs:
  appimage:
    name: Build AppImage
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libpipewire-0.3-dev \
            libclang-dev \
            appstream

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-appimage-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-appimage-

      - name: Build release binary
        run: cargo build --release

      - name: Install appimage-builder
        run: |
          sudo apt-get install -y python3-pip python3-setuptools patchelf desktop-file-utils libgdk-pixbuf-2.0-dev fuse
          sudo pip3 install appimage-builder

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/metainfo
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
          cp target/release/venturi AppDir/usr/bin/
          cp data/venturi.desktop AppDir/usr/share/applications/
          cp data/org.venturi.Venturi.metainfo.xml AppDir/usr/share/metainfo/
          cp data/org.venturi.Venturi.svg AppDir/usr/share/icons/hicolor/scalable/apps/

      - name: Build AppImage
        run: appimage-builder --recipe AppImageBuilder.yml --skip-tests

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: venturi-appimage
          path: "*.AppImage"
          retention-days: 30
