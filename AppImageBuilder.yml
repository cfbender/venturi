version: 1

AppDir:
  path: AppDir
  app_info:
    id: org.venturi.Venturi
    name: Venturi
    icon: org.venturi.Venturi
    version: 0.1.0
    exec: usr/bin/venturi
    exec_args: $@
  files:
    include:
      - target/release/venturi
      - data/venturi.desktop
      - data/org.venturi.Venturi.metainfo.xml
      - data/org.venturi.Venturi.svg
  runtime:
    env:
      GTK_THEME: Adwaita
  after_bundle: |
    mkdir -p "$TARGET_APPDIR/usr/share/icons/hicolor/scalable/apps"
    cp data/org.venturi.Venturi.svg "$TARGET_APPDIR/usr/share/icons/hicolor/scalable/apps/"

AppImage:
  arch: x86_64
  update-information: guess
